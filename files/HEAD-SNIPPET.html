<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║   gpt.js — PWA <head> additions                             ║
  ║   Paste this block into your <head>, BEFORE closing </head>  ║
  ╚══════════════════════════════════════════════════════════════╝
-->

<!-- 1. PWA Manifest (required) -->
<link rel="manifest" href="./manifest.json">

<!-- 2. Theme color (browser chrome coloring) -->
<meta name="theme-color" content="#0d0d0d">

<!-- 3. Apple PWA support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="gpt.js">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">

<!-- 4. Tile color for Windows/Edge -->
<meta name="msapplication-TileColor" content="#0d0d0d">
<meta name="msapplication-TileImage" content="./icons/icon-192.png">

<!-- 5. General meta -->
<meta name="application-name" content="gpt.js">
<meta name="description" content="Train a miniature GPT language model entirely in your browser.">
<meta name="mobile-web-app-capable" content="yes">

<!-- 6. Favicon fallback -->
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">

<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║   Service Worker Registration                                ║
  ║   Paste this block at the END of <body>, before </body>      ║
  ╚══════════════════════════════════════════════════════════════╝
-->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker
        .register('./service-worker.js', { scope: './' })
        .then(function (reg) {
          console.log('[PWA] Service Worker registered. Scope:', reg.scope);
        })
        .catch(function (err) {
          console.warn('[PWA] Service Worker registration failed:', err);
        });
    });
  }
</script>
