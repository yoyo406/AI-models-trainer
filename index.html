<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Neural Network - Hand Control</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #00f2ff;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
        }
        .stats { font-size: 12px; margin-top: 10px; opacity: 0.7; }
        .hint {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: #fff; font-size: 14px; opacity: 0.5; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 24px; font-weight: bold;">Neural Core v2.0</div>
    <div id="status" class="stats">Initialisation du flux vidéo...</div>
    <div id="zoom-level" class="stats">Scale: 1.0x</div>
</div>

<div class="hint">Ecartez le pouce et l'index pour zoomer • Approchez vos mains des neurones</div>

<video id="input_video" style="display:none"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusText = document.getElementById('status');
    const zoomText = document.getElementById('zoom-level');

    let nodes = [];
    let currentScale = 1;
    let targetScale = 1;
    const NODE_COUNT = 60;
    const CONNECT_DIST = 180;

    // --- INITIALISATION DU RESEAU ---
    function initNodes() {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        nodes = [];
        for (let i = 0; i < NODE_COUNT; i++) {
            nodes.push({
                x: Math.random() * canvasElement.width,
                y: Math.random() * canvasElement.height,
                vx: (Math.random() - 0.5) * 1.5,
                vy: (Math.random() - 0.5) * 1.5,
                radius: Math.random() * 2 + 1
            });
        }
    }

    // --- CALCULS ---
    function getDist(p1, p2) {
        return Math.sqrt((p1.x - p2.x)**2 + (p1.y - p2.y)**2);
    }

    function onResults(results) {
        // Nettoyage et dessin de la vidéo en fond
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // Effet miroir pour la vidéo
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
        canvasCtx.globalAlpha = 0.25; // Sombre pour faire ressortir le néon
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.restore();

        let fingerInteractions = [];

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            statusText.innerText = "Système : Mains détectées";
            
            results.multiHandLandmarks.forEach(landmarks => {
                // Coordonnées MediaPipe (0 à 1) -> Pixels (Inversé pour le miroir)
                const thumb = { x: (1 - landmarks[4].x) * canvasElement.width, y: landmarks[4].y * canvasElement.height };
                const index = { x: (1 - landmarks[8].x) * canvasElement.width, y: landmarks[8].y * canvasElement.height };
                
                fingerInteractions.push(thumb, index);

                // Geste de Zoom Dynamique
                const d = getDist(thumb, index);
                targetScale = Math.max(0.5, Math.min(2.5, d / 150));
                
                // Dessin du tracking des doigts (Optionnel, style HUD)
                canvasCtx.strokeStyle = '#00f2ff';
                canvasCtx.lineWidth = 2;
                canvasCtx.beginPath();
                canvasCtx.arc(index.x, index.y, 8, 0, 2*Math.PI);
                canvasCtx.stroke();
            });
        } else {
            statusText.innerText = "Système : En attente de détection...";
            targetScale = 1;
        }

        // Lissage du zoom
        currentScale += (targetScale - currentScale) * 0.1;
        zoomText.innerText = `Scale: ${currentScale.toFixed(2)}x`;

        drawNetwork(fingerInteractions);
    }

    // --- DESSIN DU RÉSEAU ---
    function drawNetwork(fingers) {
        canvasCtx.save();
        
        // Application du zoom centré
        canvasCtx.translate(canvasElement.width/2, canvasElement.height/2);
        canvasCtx.scale(currentScale, currentScale);
        canvasCtx.translate(-canvasElement.width/2, -canvasElement.height/2);

        // Style néon
        canvasCtx.shadowBlur = 10;
        canvasCtx.shadowColor = '#00f2ff';
        canvasCtx.globalCompositeOperation = 'lighter';

        nodes.forEach((node, i) => {
            // Animation
            node.x += node.vx;
            node.y += node.vy;

            // Rebond
            if (node.x < 0 || node.x > canvasElement.width) node.vx *= -1;
            if (node.y < 0 || node.y > canvasElement.height) node.vy *= -1;

            // Attraction par les mains
            fingers.forEach(f => {
                const d = getDist(node, f);
                if (d < 250) {
                    node.x += (f.x - node.x) * 0.03;
                    node.y += (f.y - node.y) * 0.03;
                }
            });

            // Dessin Neurone
            canvasCtx.beginPath();
            canvasCtx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
            canvasCtx.fillStyle = '#fff';
            canvasCtx.fill();

            // Dessin Connexions
            for (let j = i + 1; j < nodes.length; j++) {
                const node2 = nodes[j];
                const d = getDist(node, node2);
                if (d < CONNECT_DIST) {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(node.x, node.y);
                    canvasCtx.lineTo(node2.x, node2.y);
                    const opacity = 1 - (d / CONNECT_DIST);
                    canvasCtx.strokeStyle = `rgba(0, 242, 255, ${opacity * 0.5})`;
                    canvasCtx.lineWidth = 0.8;
                    canvasCtx.stroke();
                }
            }
        });

        canvasCtx.restore();
    }

    // --- SETUP CAMERA & MEDIAPIPE ---
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.5
    });
    hands.onResults(onResults);s

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 1280,
        height: 720
    });

    window.addEventListener('resize', initNodes);
    initNodes();
    camera.start();
</script>

</body>
</html>
